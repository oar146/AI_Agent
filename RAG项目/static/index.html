<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能对话助手</title>
    <style>
        :root {
            --bg: #FAF7F2;
            --bg-sidebar: #F0EBE3;
            --bg-card: #FFFFFF;
            --text: #3D3830;
            --text-secondary: #8A8379;
            --text-muted: #B5AFA5;
            --border: #E5DDD3;
            --accent: #A8956B;
            --accent-hover: #968256;
            --user-bubble: #EDE6DA;
            --assistant-bubble: #FFFFFF;
            --shadow: 0 1px 3px rgba(61, 56, 48, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .sidebar-header {
            padding: 24px 20px 16px;
        }

        .sidebar-header .logo-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            flex-shrink: 0;
        }

        .sidebar-header .logo-text h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
        }

        .sidebar-header .logo-text p {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .user-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .user-section .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .user-section .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }

        .user-section .user-name {
            font-size: 13px;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .user-section .logout-btn {
            padding: 5px 12px;
            border: 1px solid var(--border);
            background: transparent;
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }

        .user-section .logout-btn:hover {
            color: #C45C5C;
            border-color: #E8C4C4;
        }

        .new-chat-btn {
            margin: 12px 14px 8px;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .new-chat-btn:hover {
            background: var(--user-bubble);
            border-color: var(--accent);
        }

        .new-chat-btn svg { width: 15px; height: 15px; }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 10px 12px;
        }

        .session-item {
            padding: 10px 12px;
            margin-bottom: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .session-item:hover { background: rgba(255,255,255,0.5); color: var(--text); }
        .session-item.active { background: var(--bg-card); color: var(--text); box-shadow: var(--shadow); }

        .session-item .preview {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-item .delete-btn {
            opacity: 0;
            width: 22px;
            height: 22px;
            border: none;
            background: transparent;
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .session-item:hover .delete-btn { opacity: 1; }
        .session-item .delete-btn:hover { color: #C45C5C; }

        /* ========== 主聊天区域 ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .chat-header {
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header .title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        .chat-header .status {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-header .status .dot {
            width: 6px;
            height: 6px;
            background: #7BAE7F;
            border-radius: 50%;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 28px 28px 12px;
            scroll-behavior: smooth;
        }

        .messages-container .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .messages-container .empty-state .icon-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--user-bubble);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .messages-container .empty-state .icon-ring .icon {
            font-size: 20px;
            color: var(--accent);
        }

        .messages-container .empty-state h3 {
            font-size: 16px;
            color: var(--text);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .messages-container .empty-state p {
            font-size: 13px;
            color: var(--text-secondary);
            max-width: 280px;
            line-height: 1.6;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
        }

        .message.user .avatar { background: var(--accent); }
        .message.assistant .avatar { background: #C4B49A; }

        .message .bubble {
            max-width: 72%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.7;
            word-wrap: break-word;
        }

        .message.user { flex-direction: row-reverse; }

        .message.user .bubble {
            background: var(--user-bubble);
            color: var(--text);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: var(--assistant-bubble);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow);
        }

        /* Markdown */
        .message.assistant .bubble p { margin-bottom: 8px; }
        .message.assistant .bubble p:last-child { margin-bottom: 0; }
        .message.assistant .bubble ul,
        .message.assistant .bubble ol { margin: 8px 0; padding-left: 20px; }
        .message.assistant .bubble li { margin-bottom: 3px; }
        .message.assistant .bubble code {
            background: var(--user-bubble);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Consolas', monospace;
            color: var(--accent-hover);
        }
        .message.assistant .bubble pre {
            background: #F5F0E8;
            color: var(--text);
            padding: 14px 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid var(--border);
        }
        .message.assistant .bubble pre code { background: transparent; padding: 0; }
        .message.assistant .bubble h1,
        .message.assistant .bubble h2,
        .message.assistant .bubble h3 { margin-top: 14px; margin-bottom: 8px; color: var(--text); }
        .message.assistant .bubble h1 { font-size: 17px; }
        .message.assistant .bubble h2 { font-size: 15px; }
        .message.assistant .bubble h3 { font-size: 14px; }
        .message.assistant .bubble strong { font-weight: 600; }
        .message.assistant .bubble blockquote {
            border-left: 2px solid var(--accent);
            padding-left: 12px;
            color: var(--text-secondary);
            margin: 8px 0;
        }
        .message.assistant .bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
        .message.assistant .bubble th,
        .message.assistant .bubble td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
        .message.assistant .bubble th { background: var(--user-bubble); font-weight: 600; }
        .message.assistant .bubble a { color: var(--accent); text-decoration: none; }
        .message.assistant .bubble a:hover { text-decoration: underline; }

        .message.assistant .typing {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .message.assistant .typing span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .message.assistant .typing span:nth-child(2) { animation-delay: 0.2s; }
        .message.assistant .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-5px); opacity: 0.7; }
        }

        /* ========== 输入区域 ========== */
        .input-area {
            padding: 14px 28px 20px;
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 6px 6px 6px 16px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within { border-color: var(--accent); }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px 0;
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.5;
        }

        .input-wrapper textarea::placeholder { color: var(--text-muted); }

        .send-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--accent);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .send-btn svg { width: 16px; height: 16px; }

        /* ========== 文件上传 ========== */
        .upload-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }
        .upload-btn:hover { color: var(--accent); background: var(--user-bubble); }
        .upload-btn svg { width: 18px; height: 18px; }

        .file-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            margin: 0 16px 6px;
            background: var(--user-bubble);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text);
            animation: fadeIn 0.2s ease;
        }
        .file-tag .file-icon { font-size: 14px; flex-shrink: 0; }
        .file-tag .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-tag .file-remove {
            width: 18px;
            height: 18px;
            border: none;
            background: transparent;
            border-radius: 4px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: color 0.15s;
            flex-shrink: 0;
        }
        .file-tag .file-remove:hover { color: #C45C5C; }

        #fileInput { display: none; }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                min-width: unset;
                position: fixed;
                z-index: 100;
                left: -100%;
                top: 0;
                bottom: 0;
                transition: left 0.25s ease;
            }
            .sidebar.open { left: 0; }
            .menu-toggle { display: flex !important; }
            .messages-container { padding: 16px 16px 8px; }
            .input-area { padding: 10px 16px 14px; }
            .message .bubble { max-width: 88%; }
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(61, 56, 48, 0.2);
            z-index: 99;
        }

        .sidebar-overlay.show { display: block; }

        .streaming-cursor::after {
            content: '▌';
            animation: cursorBlink 0.8s step-end infinite;
            color: var(--accent);
        }

        @keyframes cursorBlink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 移动端遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-wrap" title="AI 智能助手">
                <div class="logo-icon">✦</div>
                <div class="logo-text">
                    <h1>AI 智能助手</h1>
                    <p>基于知识库的 RAG 对话系统</p>
                </div>
            </div>
        </div>
        <button class="new-chat-btn" onclick="newSession()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            新建对话
        </button>
        <div class="session-list" id="sessionList"></div>

        <!-- 用户信息 -->
        <div class="user-section">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">我</div>
                <span class="user-name" id="userName">用户</span>
            </div>
            <button class="logout-btn" onclick="handleLogout()">退出登录</button>
        </div>
    </aside>

    <!-- 主区域 -->
    <main class="main-content">
        <div class="chat-header">
            <div style="display:flex;align-items:center;gap:12px;">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <span class="title" id="chatTitle">智能对话</span>
            </div>
            <div class="status">
                <span class="dot"></span>
                系统在线
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="empty-state" id="emptyState">
                <div class="icon-ring">
                    <span class="icon">✦</span>
                </div>
                <h3>开始新的对话</h3>
                <p>在下方输入你的问题，AI 助手将结合知识库为你提供解答</p>
            </div>
            <div id="messagesList"></div>
        </div>

        <div class="input-area">
            <div id="fileTagContainer"></div>
            <div class="input-wrapper">
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()" title="上传文件">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <input type="file" id="fileInput" accept=".txt,.csv,.docx" onchange="handleFileSelect(event)">
                <textarea id="messageInput" rows="1" placeholder="输入你的问题..." 
                    onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
// ========== 状态管理 ==========
let currentSessionId = null;
let isStreaming = false;
let sessions = [];
let currentUser = '';
let selectedFile = null;

// ========== DOM 引用 ==========
const sessionListEl = document.getElementById('sessionList');
const messagesListEl = document.getElementById('messagesList');
const emptyStateEl = document.getElementById('emptyState');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const chatTitle = document.getElementById('chatTitle');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');
const userNameEl = document.getElementById('userName');
const userAvatarEl = document.getElementById('userAvatar');

// ========== 认证检查 ==========
function getToken() {
    return localStorage.getItem('token');
}

async function checkAuth() {
    const token = getToken();
    if (!token) {
        window.location.href = '/login';
        return false;
    }
    try {
        const res = await fetch(`${window.location.origin}/api/auth/verify`, {
            headers: { 'Authorization': 'Bearer ' + token },
        });
        if (!res.ok) {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/login';
            return false;
        }
        const data = await res.json();
        currentUser = data.username;
        userNameEl.textContent = currentUser;
        userAvatarEl.textContent = currentUser.charAt(0).toUpperCase();
        return true;
    } catch (_) {
        window.location.href = '/login';
        return false;
    }
}

// ========== API 调用 ==========
const API_BASE = window.location.origin;

function authHeaders() {
    const token = getToken();
    return token ? { 'Authorization': 'Bearer ' + token } : {};
}

async function apiGet(path) {
    const res = await fetch(`${API_BASE}${path}`, {
        headers: { ...authHeaders() },
    });
    return res.json();
}

async function apiPost(path, body) {
    const res = await fetch(`${API_BASE}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify(body),
    });
    return res.json();
}

async function apiDelete(path) {
    const res = await fetch(`${API_BASE}${path}`, {
        method: 'DELETE',
        headers: { ...authHeaders() },
    });
    return res.json();
}

// ========== 退出登录 ==========
async function handleLogout() {
    const token = getToken();
    if (token) {
        await fetch(`${API_BASE}/api/auth/logout`, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
        });
    }
    localStorage.removeItem('token');
    localStorage.removeItem('username');
    window.location.href = '/login';
}

// ========== 会话管理 ==========
async function loadSessions() {
    const data = await apiGet('/api/sessions');
    sessions = data.sessions || [];
    renderSessions();
}

function renderSessions() {
    if (sessions.length === 0) {
        sessionListEl.innerHTML = `
            <div style="text-align:center;color:#B5AFA5;padding:40px 16px;font-size:12px;">
                暂无对话记录
            </div>`;
        return;
    }
    sessionListEl.innerHTML = sessions.map(s => `
        <div class="session-item ${s.id === currentSessionId ? 'active' : ''}" 
             onclick="switchSession('${s.id}')">
            <span class="preview">${escapeHtml(s.preview)}</span>
            <button class="delete-btn" onclick="event.stopPropagation();deleteSession('${s.id}')" title="删除对话">✕</button>
        </div>
    `).join('');
}

async function switchSession(sessionId) {
    if (isStreaming) return;
    currentSessionId = sessionId;
    renderSessions();
    await loadMessages(sessionId);
    closeSidebarMobile();
}

async function newSession() {
    if (isStreaming) return;
    const data = await apiPost('/api/sessions', {});
    currentSessionId = data.session_id;
    messagesListEl.innerHTML = '';
    emptyStateEl.style.display = 'flex';
    chatTitle.textContent = '新对话';
    await loadSessions();
    closeSidebarMobile();
}

async function deleteSession(sessionId) {
    if (isStreaming) return;
    if (!confirm('确定要删除这个对话吗？')) return;
    await apiDelete(`/api/sessions/${sessionId}`);
    if (currentSessionId === sessionId) {
        currentSessionId = null;
        messagesListEl.innerHTML = '';
        emptyStateEl.style.display = 'flex';
        chatTitle.textContent = '智能对话';
    }
    await loadSessions();
}

async function loadMessages(sessionId) {
    const data = await apiGet(`/api/sessions/${sessionId}/messages`);
    const messages = data.messages || [];
    messagesListEl.innerHTML = '';
    if (messages.length === 0) {
        emptyStateEl.style.display = 'flex';
        chatTitle.textContent = '新对话';
    } else {
        emptyStateEl.style.display = 'none';
        chatTitle.textContent = '继续对话';
        messages.forEach(m => appendMessage(m.role, m.content, false));
    }
    scrollToBottom();
}

// ========== 文件上传处理 ==========
function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['txt', 'csv', 'docx'].includes(ext)) {
        alert('仅支持 .txt、.csv、.docx 文件');
        event.target.value = '';
        return;
    }
    selectedFile = file;
    renderFileTag();
    autoResize(document.getElementById('messageInput'));
}

function removeSelectedFile() {
    selectedFile = null;
    document.getElementById('fileInput').value = '';
    renderFileTag();
}

function renderFileTag() {
    const container = document.getElementById('fileTagContainer');
    if (!selectedFile) {
        container.innerHTML = '';
        return;
    }
    const icon = selectedFile.name.endsWith('.docx') ? '📄' : '📃';
    container.innerHTML = `
        <div class="file-tag">
            <span class="file-icon">${icon}</span>
            <span class="file-name">${escapeHtml(selectedFile.name)}</span>
            <button class="file-remove" onclick="removeSelectedFile()" title="移除文件">✕</button>
        </div>
    `;
}

// ========== 消息发送 ==========
async function sendMessage() {
    const text = messageInput.value.trim();
    if ((!text && !selectedFile) || isStreaming) return;

    if (!currentSessionId) {
        const data = await apiPost('/api/sessions', {});
        currentSessionId = data.session_id;
        await loadSessions();
    }

    emptyStateEl.style.display = 'none';

    // 构建用户消息显示（带文件信息）
    let displayText = text;
    if (selectedFile) {
        displayText = text ? `[文件] ${selectedFile.name}\n${text}` : `[文件] ${selectedFile.name}`;
    }
    appendMessage('user', displayText);

    messageInput.value = '';
    sendBtn.disabled = true;
    autoResize(messageInput);

    const aiMsgDiv = document.createElement('div');
    aiMsgDiv.className = 'message assistant';
    aiMsgDiv.innerHTML = `
        <div class="avatar">AI</div>
        <div class="bubble">
            <div class="typing">
                <span></span><span></span><span></span>
            </div>
        </div>
    `;
    messagesListEl.appendChild(aiMsgDiv);
    scrollToBottom();

    isStreaming = true;
    chatTitle.textContent = '正在回复...';
    let accumulated = '';

    try {
        let response;
        if (selectedFile) {
            // 带文件上传的聊天
            const formData = new FormData();
            formData.append('message', text || '请分析这个文件的内容');
            formData.append('session_id', currentSessionId);
            formData.append('file', selectedFile);
            const token = getToken();
            response = await fetch(`${API_BASE}/api/chat/with-file`, {
                method: 'POST',
                headers: token ? { 'Authorization': 'Bearer ' + token } : {},
                body: formData,
            });
            removeSelectedFile();
        } else {
            // 普通聊天
            response = await fetch(`${API_BASE}/api/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...authHeaders() },
                body: JSON.stringify({ message: text, session_id: currentSessionId }),
            });
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const dataStr = line.slice(6).trim();
                if (dataStr === '[DONE]') continue;

                try {
                    const data = JSON.parse(dataStr);
                    if (data.error) {
                        accumulated += `\n\n⚠️ 错误: ${data.error}`;
                    } else if (data.content) {
                        accumulated += data.content;
                    }
                } catch (e) {}
            }

            const bubble = aiMsgDiv.querySelector('.bubble');
            if (accumulated) {
                bubble.innerHTML = renderMarkdown(accumulated) + '<span class="streaming-cursor"></span>';
            }
            scrollToBottom();
        }

        const bubble = aiMsgDiv.querySelector('.bubble');
        if (accumulated) {
            bubble.innerHTML = renderMarkdown(accumulated);
        } else {
            bubble.textContent = '抱歉，暂无回复。';
        }
    } catch (err) {
        const bubble = aiMsgDiv.querySelector('.bubble');
        bubble.innerHTML = `<p style="color:#ef4444;">⚠️ 网络错误，请检查连接后重试。</p>`;
    }

    isStreaming = false;
    sendBtn.disabled = false;
    chatTitle.textContent = currentSessionId ? '继续对话' : '智能对话';
    messageInput.focus();
    await loadSessions();
    scrollToBottom();
}

function appendMessage(role, content, animate = true) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
        <div class="avatar">${role === 'user' ? '我' : 'AI'}</div>
        <div class="bubble">${role === 'assistant' ? renderMarkdown(content) : escapeHtml(content)}</div>
    `;
    messagesListEl.appendChild(div);
    if (animate) scrollToBottom();
    return div;
}

// ========== Markdown 渲染 ==========
function renderMarkdown(text) {
    if (!text) return '';
    let html = text;

    html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        const trimmed = code.trim();
        return `<pre><code>${trimmed}</code></pre>`;
    });

    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    html = html.replace(/^---$/gm, '<hr>');
    html = html.replace(/^&gt;\s?(.*)$/gm, '<blockquote>$1</blockquote>');

    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

    html = html.replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<ul>|<ol>)?(<li>.*<\/li>\n?)+(<\/ul>|<\/ol>)?/g, (match) => {
        if (match.includes('<ul>') || match.includes('<ol>')) return match;
        return '<ol>' + match + '</ol>';
    });

    html = html.replace(/^#{3}\s(.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^#{2}\s(.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^#{1}\s(.+)$/gm, '<h1>$1</h1>');

    const paragraphs = html.split(/\n\n+/);
    html = paragraphs.map(p => {
        p = p.trim();
        if (!p) return '';
        if (/^<(h[1-3]|ul|ol|li|blockquote|pre|hr)/.test(p)) return p;
        p = p.replace(/\n/g, '<br>');
        return `<p>${p}</p>`;
    }).join('\n');

    return html;
}

// ========== 工具函数 ==========
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function scrollToBottom() {
    const container = document.getElementById('messagesContainer');
    requestAnimationFrame(() => {
        container.scrollTop = container.scrollHeight;
    });
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    sendBtn.disabled = !el.value.trim() || isStreaming;
}

function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function toggleSidebar() {
    sidebar.classList.toggle('open');
    sidebarOverlay.classList.toggle('show');
}

function closeSidebarMobile() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('show');
}

// ========== 初始化 ==========
async function init() {
    const authed = await checkAuth();
    if (!authed) return;
    await loadSessions();
    if (sessions.length > 0) {
        currentSessionId = sessions[0].id;
        renderSessions();
        await loadMessages(currentSessionId);
    }
    messageInput.focus();
}

init();
</script>
